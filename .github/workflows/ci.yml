name: ci

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - "**"

jobs:
  unified:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable
      - name: Install deps
        run: yarn --immutable
      - name: Build
        run: yarn build
      - name: Lint
        run: yarn run lint
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      - name: "Unit Tests"
        run: "yarn run test:unit"
      - name: "Integrations Tests"
        run: "yarn run test:integrations"
